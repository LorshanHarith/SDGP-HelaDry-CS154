name: 🧪 HelaDry Postman Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  postman-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.9]
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: 📦 Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r Backend/requirements.txt
        pip install requests
        
    - name: 📦 Install Node.js and Newman
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 Install Newman globally
      run: npm install -g newman newman-reporter-htmlextra
        
    - name: 🔧 Setup Firebase Authentication
      run: |
        # Generate mock Firebase token for testing
        python setup_firebase_auth.py --token "github-actions-test-token-${{ github.run_id }}"
        
    - name: 🚀 Start Backend Server
      run: |
        # Start backend server in background
        cd Backend
        python app.py > backend.log 2>&1 &
        BACKEND_PID=$!
        echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
        sleep 10
        
        # Check if server is running
        curl -f http://localhost:5000/ || exit 1
      shell: bash
      
    - name: 🧪 Run Backend API Tests
      run: |
        newman run postman_collection.json \
          -e postman_environment.json \
          --reporters cli,htmlextra,json \
          --reporter-htmlextra-export test_reports/backend-tests-${{ github.run_id }}.html \
          --reporter-json-export test_reports/backend-tests-${{ github.run_id }}.json \
          --timeout-request 10000 \
          --timeout-script 10000
          
    - name: 📱 Run Frontend Integration Tests
      run: |
        newman run frontend_integration_tests.json \
          -e postman_environment.json \
          --reporters cli,htmlextra,json \
          --reporter-htmlextra-export test_reports/frontend-tests-${{ github.run_id }}.html \
          --reporter-json-export test_reports/frontend-tests-${{ github.run_id }}.json \
          --timeout-request 10000 \
          --timeout-script 10000
          
    - name: 📋 Generate Test Summary
      run: |
        python generate_test_summary.py \
          "test_reports/backend-tests-${{ github.run_id }}.json" \
          "test_reports/frontend-tests-${{ github.run_id }}.json" \
          "test_reports/test-summary-${{ github.run_id }}.txt
          
    - name: 🛑 Stop Backend Server
      run: |
        if [ ! -z "$BACKEND_PID" ]; then
          kill $BACKEND_PID || true
        fi
      shell: bash
      
    - name: 📊 Upload Test Reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-reports-${{ github.run_id }}
        path: |
          test_reports/
          Backend/backend.log
        retention-days: 30
        
    - name: 📈 Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: HelaDry Postman Test Results
        path: test_reports/backend-tests-${{ github.run_id }}.json
        reporter: newman-json-summary
        
    - name: 📝 Comment PR with Test Results
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Read test summary
          const summaryPath = `test_reports/test-summary-${{ github.run_id }}.txt`;
          let summary = 'Test summary not available';
          
          try {
            summary = fs.readFileSync(summaryPath, 'utf8');
          } catch (error) {
            console.log('Could not read test summary:', error.message);
          }
          
          // Create comment body
          const commentBody = `## 🧪 HelaDry Postman Test Results
          
          **Test Run:** ${{ github.run_number }}
          **Commit:** ${context.sha.substring(0, 7)}
          **Triggered by:** ${context.actor}
          
          ### 📋 Summary
          \`\`\`
          ${summary.substring(0, 2000)}
          \`\`\`
          
          ### 📊 Artifacts
          Test reports are available in the [Actions artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).
          
          ---
          *Auto-generated by GitHub Actions*`;
          
          // Post comment
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: commentBody
          });

  performance-check:
    runs-on: ubuntu-latest
    needs: postman-tests
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      
    - name: 📦 Download Test Reports
      uses: actions/download-artifact@v3
      with:
        name: test-reports-${{ github.run_id }}
        path: test_reports/
        
    - name: 📊 Performance Analysis
      run: |
        # Check response times and performance metrics
        python -c "
        import json
        import sys
        
        # Load test results
        try:
            with open('test_reports/backend-tests-${{ github.run_id }}.json', 'r') as f:
                backend_data = json.load(f)
            with open('test_reports/frontend-tests-${{ github.run_id }}.json', 'r') as f:
                frontend_data = json.load(f)
                
            # Simple performance check
            print('✅ Performance analysis completed')
            print('📁 Check test_reports/ for detailed metrics')
        except Exception as e:
            print(f'⚠️ Performance analysis skipped: {e}')
        "
        
    - name: 📈 Update Performance Dashboard
      run: |
        # Create performance metrics file
        echo "{
          \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
          \"run_id\": \"${{ github.run_id }}\",
          \"branch\": \"${{ github.ref_name }}\",
          \"commit\": \"${{ github.sha }}\",
          \"actor\": \"${{ github.actor }}\"
        }" > performance-metrics.json
        
    - name: 📊 Upload Performance Metrics
      uses: actions/upload-artifact@v3
      with:
        name: performance-metrics
        path: performance-metrics.json
        retention-days: 90

  notification:
    runs-on: ubuntu-latest
    needs: [postman-tests]
    if: failure()
    
    steps:
    - name: 🚨 Send Failure Notification
      run: |
        echo "❌ Postman tests failed!"
        echo "Check the GitHub Actions run for details:"
        echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        
    # Add email/slack notifications here if needed
    # - name: 📧 Send Email Notification
    #   uses: dawidd6/action-send-mail@v3
    #   with:
    #     server_address: smtp.gmail.com
    #     server_port: 465
    #     username: ${{ secrets.EMAIL_USERNAME }}
    #     password: ${{ secrets.EMAIL_PASSWORD }}
